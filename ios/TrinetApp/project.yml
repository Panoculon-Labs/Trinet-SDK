# XcodeGen spec — run `xcodegen generate` in this directory (ios/TrinetApp/)
# to produce TrinetApp.xcodeproj. Keeps the project tracked as text instead
# of as a pbxproj blob that's a nightmare to merge.
#
# Monorepo layout: this app lives at  ios/TrinetApp/  and the SDK sources at
# ios/Sources/TrinetSDK/ — so the framework target below reaches them via the
# relative path  ../Sources/TrinetSDK . The SwiftPM manifest at the repo root
# (../../Package.swift) points at the same sources for `swift build`/`swift test`.
#
# If you don't have xcodegen, `brew install xcodegen`. Alternative: open
# Xcode, File → New → Project (iOS app, SwiftUI), name "TrinetApp", then
# drag in this Sources/ folder and the local Swift package at the repo root.

name: TrinetApp
options:
  bundleIdPrefix: com.panoculon.trinet
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"          # iPhone + iPad
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal      # SDK uses actors; keep app loose for v0
    # No DEVELOPMENT_TEAM is hardcoded — signing is automatic, so each builder
    # selects their own Apple ID / team in Xcode (Signing & Capabilities) the
    # first time they run on a device. See ios/README.md → "Run on your iPhone".

# TrinetSDK is compiled as a sibling framework target inside this same
# Xcode project rather than a SwiftPM dependency — Xcode 26's local-
# package resolver has been flaky with our setup and a same-project
# framework dependency is more robust. The Package.swift at the repo
# root still works for `swift build` / `swift test` on the host; iOS
# builds go through this Xcode target.

targets:
  TrinetSDK:
    type: framework
    platform: iOS
    sources:
      - path: ../Sources/TrinetSDK     # = ios/Sources/TrinetSDK (do not move independently)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.panoculon.trinet.sdk
        PRODUCT_NAME: TrinetSDK
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "1"
        # Have Xcode synthesize the framework's Info.plist at build time.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: TrinetSDK
        # Don't sign the framework at its own build — embedded frameworks
        # get re-signed with the consuming app's identity during the app's
        # embed-and-sign phase. Standalone signing requires Xcode to
        # provision a profile for the framework's bundle id, which fails
        # if the Apple account's auto-provisioner can't reach Apple (e.g.
        # over SSH-driven xcodebuild). Skipping the framework-level sign
        # is the standard pattern and works on both signed device builds
        # and unsigned simulator builds.
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        CODE_SIGN_STYLE: Manual

  TrinetApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.panoculon.trinet.app
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
    dependencies:
      - target: TrinetSDK
        embed: true
